# Keep the pinned GitHub Actions current. The ci / test / smoke / docs / release
# workflows pin actions to exact versions (e.g. astral-sh/setup-uv@v6, uv 0.11.17,
# actions/checkout@v6); without this they go stale silently. Updates are grouped
# into a single weekly PR to keep the noise down.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
