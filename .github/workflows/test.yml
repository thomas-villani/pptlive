name: test

# Reusable test gate: a lint job (ruff check + ruff format + mypy) and a
# cross-OS / multi-Python matrix running the fake-COM unit suite. Smoke tests
# (`-m smoke`) are deselected by default (they need a real PowerPoint install —
# see smoke.yml), so this whole gate runs unattended on GitHub-hosted runners.
#
# Called by ci.yml on every PR / push to main, and by release.yml before it
# builds or publishes — one definition so the two can never drift.
on:
  workflow_call:

permissions:
  contents: read

env:
  # Use setup-python's interpreter rather than a uv-managed CPython, so the
  # matrix version is exactly the one installed; keep uv on it.
  UV_PYTHON_PREFERENCE: only-system

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v7
        with:
          # Pin uv so the lockfile it resolves matches the committed one; keep in
          # step with the version developers run locally.
          version: "0.11.17"
          enable-cache: true

      # --locked fails if uv.lock drifted from pyproject.toml, so a dependency
      # change that skipped `uv lock` can't merge silently.
      - name: Install dev dependencies
        run: uv sync --locked --extra dev

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy

  unit:
    name: unit (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # 3.14 is fresh — let it run for early warning without failing the gate.
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    strategy:
      fail-fast: false
      matrix:
        # The library floor is 3.11 (pyproject requires-python); sweep the
        # supported line on Linux, where the fake-COM suite needs no pywin32.
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
        # Plus Windows — the platform users actually run — to confirm pptlive
        # installs (pywin32 wheels) and the fake-COM suite passes there too.
        include:
          - os: windows-latest
            python-version: '3.11'
          - os: windows-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.13'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.17"
          enable-cache: true

      - name: Install (with dev extras)
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Unit tests (fake COM; smoke deselected)
        run: uv run --no-sync pytest -q

  # Single stable gate that aggregates lint + the whole unit matrix. Branch
  # protection requires the context "test / test" — with a matrix, the per-cell
  # checks are "test / unit (py3.11 on ubuntu-latest)" etc. (their names carry the
  # matrix params), so no bare "test / test" would ever report and the PR would
  # wait forever. This job's name IS "test", so it always produces that context,
  # regardless of how the matrix grows or which Python line we sweep next.
  test:
    name: test
    needs: [lint, unit]
    if: always()  # run even when a needed job failed, so the gate can report red
    runs-on: ubuntu-latest
    steps:
      - name: Require lint + unit to have passed
        run: |
          echo "lint=${{ needs.lint.result }} unit=${{ needs.unit.result }}"
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.unit.result }}" != "success" ]; then
            echo "::error::A required job did not succeed."
            exit 1
          fi
          echo "All required jobs passed."
