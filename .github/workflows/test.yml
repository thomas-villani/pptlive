name: test

# Reusable test gate: ruff + mypy + the fake-COM unit suite (no PowerPoint, so
# it runs on Linux; smoke tests are deselected by default). Called by ci.yml on
# every PR / push to main, and by release.yml before it builds or publishes — one
# definition so the two can never drift.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'
          enable-cache: true

      - name: Install deps
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run mypy

      - name: Unit tests
        run: uv run pytest
